line-length = 88
target-version = "py312"

[format]
quote-style = "double"
docstring-code-format = true
skip-magic-trailing-comma = false

[lint]
ignore = [
    "ASYNC109", # We're okay with having coroutines with timeout as the timeout argument is just passed to httpx calls
    "TC",       # Don't wanna have to move imports into type checking blocks
    "S101",
    "D103",
    "ERA001",
    "ANN001",
    "ANN201",
    "D100",
    "D400",
    "D415",
    "D104",     # missing docstring in public package
    "D203",
    "D212",
    "COM812",   # for formatter
    "ISC001",   # for formatter
    "FBT003",   # doesn't play well with typer default arg values
    "B008",     # doesn't play well with typer arguments as default values
    "PLR0913",  # too many arguments makes no sense in CLI apps
    "TRY003",   # I wanna be able to raise an exception with a literal string
    "EM101",    # I wanna be able to raise an exception with a literal string
    "G004",     # I wanna use f-string with logging statements
    "TD003",    # No issue links
    "FIX002",   # Allow for todos in code
    "EM102",    # f-strings in exceptions
    "ANN204",   # No need for type annotations for __init__
    "RUF001",   # We might have weird characters in our code due to explicit normalization
    "BLE001",   # Blind exception
    "D107",     # Docstring in __init__
    "D101",     # Docstring in public class
    "TD002",    # No issue links
    "E501",     # Line too long
    "ANN401",   # Allow for Any
    "D102",     # Docstring in public function
    "PERF203",  # try-except in loop
    "PERF401",  # .extend() is faster than .append()
    "T100",     # ipdb
    "FBT001",   # bool as positional argument
    "RUF006",   # Store a reference to the return value
    "PT015",    # Assertions are used to check for unreachable code paths
    "B018",
    "PLC0415",  # Except for marimo files..
    "ANN202",   # marimo
    "PLR0915",
    "T201",
]
exclude = ["notebooks/*"]
select = ["ALL"]

[lint.per-file-ignores]
# Marimo notebooks have specific patterns that trigger false positives
"**/02_generate_figures.py" = [
    "N803",    # Argument name should be lowercase (marimo uses uppercase for cell returns)
    "N806",    # Variable in function should be lowercase (constants in cells)
    "F821",    # Undefined name (marimo cells have cross-cell dependencies)
    "ARG001",  # Unused function argument (marimo cell arguments)
    "PLR2004", # Magic value used in comparison (p-value thresholds are standard)
    "B023",    # Function does not bind loop variable (marimo cell scoping)
]
"**/04_find_example_verse.py" = [
    "C901",     # main() is complex by nature (single entry point)
    "PLR0912",  # Too many branches in main
    "FBT002",   # Boolean default in typer CLI args is idiomatic
    "RUF002",   # EN DASH in docstrings is intentional
]
"**/03_poster_figures.py" = [
    "N803",
    "N806",
    "F821",
    "ARG001",
    "PLR2004",
    "B023",
]
"**/05_poster_stats.py" = [
    "ARG001",   # Unused arg in marimo cell signature
    "C901",     # compute_stats is complex by design
    "EXE001",   # Shebang for uv run
    "PLR0912",  # Many branches in stats computation
    "RUF003",   # Unicode × and – in comments are intentional
]
"**/05_translation_spectrum.py" = [
    "D205",     # Docstring formatting
    "E402",     # Imports after marimo cell setup
    "EXE001",   # Shebang for uv run
    "RUF003",   # Unicode – in comments is intentional
]
"**/analyze_poster.py" = [
    "B905",     # zip() without strict= in analysis script
    "D205",     # Docstring formatting
    "D401",     # Imperative mood not required for utility docstrings
    "E741",     # Short variable name l for luminance
    "EXE001",   # Shebang for uv run
    "PLR0911",  # Many return statements in classification logic
    "PLR2004",  # Magic values are WCAG/color thresholds
    "RUF003",   # Unicode – in comments is intentional
    "RUF059",   # Unpacked vars for destructuring clarity
]
"**/marimo-poster-preview.py" = [
    "N803",
    "ARG001",
]
"**/scripts/figures/**" = [
    "PLR2004",  # p-value thresholds are standard statistical constants
    "RUF002",   # multiplication sign × in docstrings is intentional
]
"**/07_find_fnv_ojb_examples.py" = [
    "FBT002",   # Boolean default in typer CLI args is idiomatic
    "PLR2004",  # Small constant in name detection heuristic
]
